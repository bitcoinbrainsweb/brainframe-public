name: Weekly Brainframe Self-Improvement Review

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  self-improvement-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run weekly review
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python3 .github/scripts/weekly_review.py
